server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy no-referrer-when-downgrade;

    # Static assets (js/css carry a ?v= cache-buster; audio/art are stable).
    # Cached up to an hour. A regex location takes precedence over the "/"
    # prefix below, so these never fall under the HTML no-store rule.
    location ~* \.(js|css|mp3|wav|ogg|webp|png|jpe?g|svg|gif|ico|woff2?|ttf)$ {
        add_header X-Content-Type-Options nosniff always;
        add_header Cache-Control "public, max-age=3600" always;
        try_files $uri =404;
    }

    # The HTML shell — served for the root AND every SPA route — must NEVER be
    # cached, or the browser heuristically caches it and keeps loading an old
    # client.js?v=… (the "I still see the old buttons" bug). no-store here means
    # the bumped asset versions always take effect on a plain reload.
    location / {
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy no-referrer-when-downgrade always;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires 0;
        try_files $uri $uri/ /index.html;
    }

    # Character art (PCs/villains from Cassbot's Obsidian vault) is now
    # served from public/assets/characters/ as static files. No external
    # mount needed — see scripts/import-vault-tokens.js.
    location /assets/characters/ {
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    # Hidden dev/reference pages (server-rendered by the backend) → Node backend.
    # Regex beats the "/" SPA prefix, so /monsters etc. don't fall through to the
    # HTML shell. Not linked anywhere in the UI.
    location ~ ^/(monsters|spells|classes)/?$ {
        proxy_pass         http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # HTTP API → Node backend
    location /api/ {
        proxy_pass         http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        client_max_body_size 16k;
    }

    # Socket.IO (HTTP long-poll fallback + WebSocket upgrade).
    # NOTE: ^~ so this prefix BEATS the "*.js" static-asset regex above —
    # otherwise /socket.io/socket.io.js gets served as a (missing) static file
    # and `io` is undefined in the client.
    location ^~ /socket.io/ {
        proxy_pass         http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
