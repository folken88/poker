server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy no-referrer-when-downgrade;

    # Static UI — index.html is no-cache so cache-busted asset versions
    # always take effect on plain reload.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires 0;
        try_files /index.html =404;
    }
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Character art (PCs/villains from Cassbot's Obsidian vault) is now
    # served from public/assets/characters/ as static files. No external
    # mount needed — see scripts/import-vault-tokens.js.
    location /assets/characters/ {
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    # HTTP API → Node backend
    location /api/ {
        proxy_pass         http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        client_max_body_size 16k;
    }

    # Socket.IO (HTTP long-poll fallback + WebSocket upgrade)
    location /socket.io/ {
        proxy_pass         http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
