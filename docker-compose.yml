services:
  backend:
    build: ./backend
    container_name: folken-poker-backend
    environment:
      - PORT=3000
      - DATA_DIR=/app/data
      - DEFAULT_STACK=5000
      # Between-hands showdown pause — how long the winner/board stays on
      # screen before the next hand. Code default is 15s; trimmed to 10s.
      - HAND_RESULT_PAUSE_MS=10000
      # Optional one-line "what changed" note posted to table chat on boot.
      # Set per-deploy: DEPLOY_NOTE="winner gloat lines" docker compose up -d backend
      - DEPLOY_NOTE=${DEPLOY_NOTE:-}
      # ---- LLM banter (in-character chat from Ollama) ----
      # Set ENABLED=0 to silence. Model name must match `ollama list`
      # output on the host. host.docker.internal points at the host
      # network from inside the container.
      - LLM_BANTER_ENABLED=1
      # Defaults to local Ollama; override LLM_ENDPOINT/MODEL/API_KEY in .env
      # (e.g. OpenRouter) when no local model server is available.
      - LLM_ENDPOINT=${LLM_ENDPOINT:-http://host.docker.internal:11434/api/chat}
      - LLM_MODEL=${LLM_MODEL:-gemma4:e4b}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_BANTER_COOLDOWN_MS=18000
      - LLM_BANTER_PROB=0.30
      - LLM_BANTER_TIMEOUT_MS=8000
      # ---- 11labs TTS (voice the AI banter aloud) ----
      # Key is loaded from .env (gitignored) via docker-compose
      # interpolation. NEVER hardcode it here. The :- syntax means
      # "empty if unset" — backend gracefully no-ops without a key.
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY:-}
      # Quality model: richer, more consistent prosody (fixes the rushed/
      # pitched-up delivery the flash model gave on short banter lines).
      # ~1s slower per line than eleven_flash_v2_5 — fine for ambient chat.
      # Bump ELEVENLABS_TIMEOUT_MS if lines start getting dropped on timeout.
      - ELEVENLABS_MODEL=eleven_multilingual_v2
      - ELEVENLABS_TIMEOUT_MS=12000
    extra_hosts:
      # Required on Linux Docker so host.docker.internal resolves
      # (Docker Desktop on Windows/Mac maps it automatically; harmless
      # there). Lets the container reach the host's Ollama at :11434.
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend/data:/app/data
      - ./backend/logs:/app/logs
    restart: unless-stopped
    networks:
      - poker-net

  web:
    image: nginx:alpine
    container_name: folken-poker-web
    ports:
      - "32086:80"
    volumes:
      - ./public:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # NOTE: character art (PCs/villains from Cassbot's Obsidian vault) is
      # now copied permanently into public/assets/characters/ — see
      # scripts/import-vault-tokens.js. The poker game is fully independent
      # of FoundryVTT; no bind mount needed.
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - poker-net

networks:
  poker-net:
    driver: bridge
